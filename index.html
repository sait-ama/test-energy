<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PixelBattle</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: row;
            background-color: #1e1e2e;
            color: #cdd6f4;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        .canvas-container {
            flex: 1;
            background-color: #11111b;
            position: relative;
            cursor: crosshair;
            overflow: hidden;
            box-shadow: inset -5px 0 15px rgba(0, 0, 0, 0.5);
        }

        .canvas-container:active {
            cursor: grabbing;
        }

        .canvas-wrapper {
            position: absolute;
            left: 0;
            top: 0;
            box-shadow: 0 0 20px rgba(0, 0, 0, 1);
            image-rendering: -webkit-optimize-contrast;
            image-rendering: pixelated;
            transform-origin: 0 0;
        }

        #pixelCanvas,
        #hoverCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        #pixelCanvas {
            background-color: #ffffff;
            position: absolute;
            top: 0;
            left: 0;
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }

        #hoverCanvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            image-rendering: pixelated;
        }

        .sidebar {
            width: 260px;
            background: #181825;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 15px;
            box-sizing: border-box;
            z-index: 10;
            border-left: 2px solid #313244;
        }

        h1 {
            margin: 0 0 10px 0;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            font-size: 24px;
            text-align: center;
        }

        .info-panel {
            background: #313244;
            padding: 10px;
            border-radius: 8px;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
            border: 1px solid #45475a;
        }

        .info-panel span {
            color: #a6e3a1;
            font-weight: bold;
        }

        .zoom-level {
            margin-top: 5px;
            font-size: 11px;
            color: #fab387;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }

        .palette {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 25px;
            padding: 10px;
            background: #1e1e2e;
            border-radius: 12px;
            border: 1px solid #313244;
            width: 100%;
            box-sizing: border-box;
        }

        .color-btn {
            width: 34px;
            height: 34px;
            border: 2px solid transparent;
            border-radius: 6px;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .color-btn:hover {
            transform: translateY(-2px);
        }

        .color-btn.active {
            border-color: #f38ba8;
            transform: scale(1.15);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .zoom-btn {
            background: #45475a;
            color: #fff;
            border: none;
            border-radius: 6px;
            width: 45px;
            height: 45px;
            font-size: 24px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .zoom-btn:hover {
            background: #585b70;
        }

        .zoom-btn:active {
            transform: translateY(2px);
            box-shadow: none;
        }

        .confirm-wrapper {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            margin-top: 10px;
            margin-bottom: 20px;
            background: #1e1e2e;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #313244;
        }

        .confirm-btn {
            background: #a6e3a1;
            color: #11111b;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
        }

        .cancel-btn {
            background: #313244;
            color: #cdd6f4;
            border: 1px solid #45475a;
            padding: 6px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
        }

        @keyframes pulse-green {
            0% {
                box-shadow: 0 0 0 0 rgba(166, 227, 161, 0.7);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(166, 227, 161, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(166, 227, 161, 0);
            }
        }

        .cooldown-text {
            font-size: 18px;
            font-weight: bold;
            color: #a6e3a1;
            text-align: center;
            margin-bottom: 20px;
            min-height: 24px;
        }

        .status {
            margin-top: auto;
            font-size: 13px;
            color: #a6adc8;
            text-align: center;
            padding: 10px;
            background: #1e1e2e;
            border-radius: 8px;
            width: 100%;
            box-sizing: border-box;
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #f38ba8;
            color: #11111b;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 100;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        .minimap-wrapper {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 150px;
            height: 150px;
            background: #fff;
            border: 2px solid #585b70;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.8);
            z-index: 50;
            overflow: hidden;
            cursor: pointer;
        }

        #pixelCanvas,
        #hoverCanvas {
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            -ms-interpolation-mode: nearest-neighbor;
            display: block;
        }

        #minimapCanvas {
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
            display: block;
        }

        .minimap-viewport {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 1.5px solid #f38ba8;
            box-sizing: border-box;
            background: rgba(243, 139, 168, 0.2);
            pointer-events: none;
        }

        .admin-header-row {
            display: flex;
            flex-direction: column;
            width: 100%;
            gap: 10px;
        }

        .admin-only {
            display: none !important;
        }

        .admin-toggle-wrapper {
            background: #f38ba8;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #ffffff;
        }

        .admin-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 11px;
            color: #11111b;
            font-weight: bold;
            cursor: pointer;
        }

        .admin-brush-group {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f38ba8;
            padding: 4px 8px;
            border-radius: 4px;
            margin-top: 10px;
            border: 1px solid #ffffff;
        }

        .admin-brush-label {
            font-size: 10px;
            font-weight: bold;
            color: #11111b;
            white-space: nowrap;
        }

        #brushSizeRange {
            flex: 1;
            height: 4px;
            cursor: pointer;
            accent-color: #11111b;
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            .canvas-container {
                flex: 1;
            }

            .minimap-wrapper {
                width: 90px !important;
                height: 90px !important;
                top: 10px !important;
                left: 10px !important;
                bottom: auto !important;
                z-index: 150 !important;
                border: 1px solid #585b70 !important;
            }


            .sidebar {
                padding: 0 !important;
                gap: 0 !important;
                height: auto !important;
                position: fixed;
                bottom: 0;
                left: 0;
                width: 100%;
                z-index: 200;
                background: #1e1e2e;
                border-top: 1px solid #313244;
                border-left: none !important;
                box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.5);
                overflow: visible !important;
                box-sizing: border-box !important;
            }

            .confirm-wrapper {
                position: absolute;
                bottom: 100%;
                left: 0;
                transform: none;
                flex-direction: row;
                width: 100%;
                max-width: none;
                background: rgba(30, 30, 46, 0.98);
                z-index: 9999 !important;
                box-shadow: 0 -5px 15px rgba(0, 0, 0, 0.3);
                margin: 0;
                padding: 6px !important;
                border-radius: 0;
                border-left: none;
                border-right: none;
                border-top: 1px solid #313244;
            }

            .sidebar-scroll-area {
                max-height: 35vh;
                overflow-y: auto;
                overflow-x: hidden !important;
                padding: 6px !important;
                display: flex;
                flex-direction: column;
                gap: 3px !important;
            }

            .sidebar h1 {
                display: none;
            }

            .admin-header-row {
                display: flex;
                flex-direction: row;
                gap: 3px !important;
                margin-bottom: 3px !important;
                width: 100%;
                align-items: center !important;
            }

            .admin-toggle-wrapper {
                flex: 1;
                padding: 1px 4px !important;
                margin-bottom: 0 !important;
                font-size: 10px !important;
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 20px !important;
                border: 1px solid rgba(255, 255, 255, 0.15) !important;
                border-radius: 4px !important;
            }

            .info-panel {
                flex: 1.2;
                padding: 1px 4px !important;
                margin-bottom: 0 !important;
                font-size: 8px !important;
                display: flex;
                flex-direction: column;
                justify-content: center;
                min-height: 15px !important;
                line-height: 1 !important;
                border: 1px solid rgba(255, 255, 255, 0.15) !important;
                border-radius: 4px !important;
            }

            .info-panel div {
                margin-bottom: 1px !important;
            }

            .admin-brush-group {
                padding: 1px 6px !important;
                margin-bottom: 4px !important;
                font-size: 9px !important;
                border: 1px solid rgba(255, 255, 255, 0.15) !important;
                border-radius: 4px !important;
            }

            #adminTokenGroup,
            .master-only {
                margin-top: 15px !important;
            }

            .palette {
                gap: 3px !important;
                margin-bottom: 3px !important;
                padding: 3px !important;
            }

            .color-btn {
                width: 24px !important;
                height: 24px !important;
            }

            .cooldown-text {
                font-size: 13px !important;
                margin-bottom: 2px !important;
                min-height: auto !important;
            }

            .rollback-panel {
                bottom: 2px !important;
                padding: 6px !important;
            }

            .confirm-wrapper {
                position: absolute;
                bottom: 100%;
                left: 0;
                transform: none;
                flex-direction: row;
                width: 100%;
                max-width: none;
                background: rgba(30, 30, 46, 0.98);
                z-index: 500;
                box-shadow: 0 -5px 15px rgba(0, 0, 0, 0.3);
                margin: 0;
                padding: 6px !important;
                border-radius: 0;
                border-left: none;
                border-right: none;
                border-top: 1px solid #313244;
            }

            .confirm-btn,
            .cancel-btn {
                flex: 1;
                padding: 6px !important;
                font-size: 13px !important;
                margin: 0;
            }
        }

        #pixelCanvas, #hoverCanvas {
            z-index: 1;
        }

        .rollback-panel {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e1e2e;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #313244;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            z-index: 300;
            display: none;
            flex-direction: column;
            gap: 10px;
            width: 90%;
            max-width: 400px;
        }

        .master-only {
            display: none !important;
        }

        .show-master {
            display: flex !important;
        }
    </style>
</head>

            <canvas id="hoverCanvas" width="500" height="500"></canvas>
        </div>
        <div class="minimap-wrapper" id="minimapWrapper">
            <canvas id="minimapCanvas" width="150" height="150"
                style="width: 100%; height: 100%; object-fit: contain; image-rendering: pixelated;"></canvas>
            <div class="minimap-viewport" id="minimapViewport"></div>
        </div>
    </div>
    <div class="sidebar">
        <div class="sidebar-scroll-area">
            <h1>⚔️ PixelBattle</h1>
            <div class="admin-header-row">
                <div id="noCdToggle" class="admin-toggle-wrapper admin-only">

            <div id="adminTokenGroup" class="admin-only" style="width: 100%; margin-top: 10px;">

                socket.onopen = null;
                socket.onmessage = null;
                socket.onerror = null;
                socket.onclose = null;
                socket.close();
            }

            socket = new WebSocket(wsUrl);

            socket.onopen = () => {
                statusEl.innerText = '🟢 Активно (В сети)';
                statusEl.style.color = '#a6e3a1';

                const urlParams = new URLSearchParams(window.location.search);
                const key = urlParams.get('key') || urlParams.get('token') || localStorage.getItem('adminToken');
                if (key) {
                    socket.send(JSON.stringify({ type: 'auth', token: key }));
                    if (urlParams.get('key') || urlParams.get('token')) {
                        window.history.replaceState({}, document.title, window.location.pathname);
                    }
                }

                if (pingInterval) clearInterval(pingInterval);
                pingInterval = setInterval(() => {
                    if (socket.readyState === WebSocket.OPEN) {
                        socket.send(JSON.stringify({ type: 'ping' }));
                    }
                }, 30000);
            };
            socket.onmessage = (event) => {
                const message = JSON.parse(event.data);
                if (message.type === 'init') {
                    const data = message.data;
                    for (let y = 0; y < data.length; y++) {
                        for (let x = 0; x < data[y].length; x++) {
                            ctx.fillStyle = data[y][x];
                            ctx.fillRect(x, y, 1, 1);
                        }
                    }
                    syncMinimap();
                } else if (message.type === 'update') {
                    ctx.fillStyle = message.color;
                    ctx.fillRect(message.x, message.y, 1, 1);
                    mCtx.fillStyle = message.color;
                    mCtx.fillRect(Math.floor(message.x * 0.3), Math.floor(message.y * 0.3), 1, 1);
                } else if (message.type === 'batch') {
                    message.pixels.forEach(p => {
                        ctx.fillStyle = p.color;
                        ctx.fillRect(p.x, p.y, 1, 1);
                        mCtx.fillStyle = p.color;
                        mCtx.fillRect(Math.floor(p.x * 0.3), Math.floor(p.y * 0.3), 1, 1);
                    });
                } else if (message.type === 'admin_status') {
                    IS_ADMIN = message.value;
                    IS_MASTER = message.is_master;

                    if (IS_ADMIN) {
                        if (message.token) {
                            localStorage.setItem('adminToken', message.token);
                        }
                        document.querySelectorAll('.admin-only').forEach(el => {
                            el.classList.add('show-admin');
                            el.style.setProperty('display', 'flex', 'important');
                        });

                        const tokenGroup = document.getElementById('adminTokenGroup');
                        if (tokenGroup) {
                            tokenGroup.style.setProperty('display', IS_MASTER ? 'flex' : 'none', 'important');
                        }

                        if (IS_MASTER) {
                            document.querySelectorAll('.master-only').forEach(el => {
                                el.classList.add('show-master');
                                el.style.setProperty('display', 'flex', 'important');
                            });
                        }

                        showToast("Режим администратора активирован!");
                    } else {
                        document.querySelectorAll('.admin-only').forEach(el => {
                            el.classList.remove('show-admin');
                            el.style.setProperty('display', 'none', 'important');
                        });
                        document.querySelectorAll('.master-only').forEach(el => {
                            el.classList.remove('show-master');
                            el.style.setProperty('display', 'none', 'important');
                        });
                        if (selectedPixel) cancelSelection();
                        localStorage.removeItem('adminToken');
                        showToast("Режим администратора отключен");
                    }
                } else if (message.type === 'area_history') {
                    areaHistoryData = message.history;
                    showToast("История получена. Двигайте ползунок!");
                    previewRollback(); // Сразу показываем превью для текущего значения слайдера
                } else if (message.type === 'token_generated') {
                    const url = new URL(window.location.href);
                    url.searchParams.set('key', message.token);
                    const fullUrl = url.toString();

                    navigator.clipboard.writeText(fullUrl).then(() => {
                        showToast("Ссылка скопирована! (10 минут)");
                        alert("Временная ссылка создана и скопирована:\n" + fullUrl);
                    });
                } else if (message.type === 'error') {
                    showToast(message.message);
                } else if (message.type === 'success') {
                    startCooldown(7);
                }
            };
            socket.onerror = (error) => {
                statusEl.innerText = '🔴 Ошибка подключения';
                statusEl.style.color = '#f38ba8';
            };
            socket.onclose = () => {
                statusEl.innerText = '🔴 Подключение закрыто. Реконнект...';
                statusEl.style.color = '#f38ba8';
                if (pingInterval) clearInterval(pingInterval);

                clearTimeout(reconnectTimeout);
                reconnectTimeout = setTimeout(connectSocket, 2000);
            };
        }

        connectSocket();

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') {
                if (!socket || socket.readyState === WebSocket.CLOSED || socket.readyState === WebSocket.CLOSING) {
                    console.log('Tab visible, reconnecting...');
                    connectSocket();
                }
            }
        });
        function startCooldown(seconds) {
            if (IS_ADMIN && toggleNoCooldown.checked) return;
            cooldownActive = true;
            cooldownTime = seconds;
            document.getElementById('confirmWrapper').style.display = 'none';
            document.getElementById('cooldownText').style.display = 'block';
            updateCooldownUI();
            const timer = setInterval(() => {
                cooldownTime--;
                updateCooldownUI();
                if (cooldownTime <= 0) {
                    clearInterval(timer);
                    cooldownActive = false;
                    cooldownText.innerText = "Готов к битве";
                    cooldownText.style.color = '#a6e3a1';
                }
            }, 1000);
        }
        function updateCooldownUI() {
            if (cooldownTime > 0) {
                cooldownText.innerText = `Ждите: ${cooldownTime} с`;
                cooldownText.style.color = '#f38ba8';
            }
        }
        let minScale = Math.min(container.clientWidth / 600, container.clientHeight / 600);
        if (minScale < 0.1) minScale = 0.1;
        let scale = minScale;
        let maxScale = minScale * 200;
        let panX = (container.clientWidth - 500 * scale) / 2;
        let panY = (container.clientHeight - 500 * scale) / 2;
        function applyTransform() {
            canvasWrapper.style.left = panX + 'px';
            canvasWrapper.style.top = panY + 'px';
            canvasWrapper.style.width = (500 * scale) + 'px';
            canvasWrapper.style.height = (500 * scale) + 'px';
            const visibleW_pct = (container.clientWidth / scale) / 500 * 100;
            const visibleH_pct = (container.clientHeight / scale) / 500 * 100;
            const startX_pct = (-panX / scale) / 500 * 100;
            const startY_pct = (-panY / scale) / 500 * 100;
            minimapViewport.style.left = startX_pct + '%';
            minimapViewport.style.top = startY_pct + '%';
            minimapViewport.style.width = visibleW_pct + '%';
            minimapViewport.style.height = visibleH_pct + '%';
            const zoomPercent = 100 + Math.round(((scale - minScale) / (maxScale - minScale)) * 400);
            zoomVal.innerText = zoomPercent;
        }
        window.addEventListener('resize', () => {
            const oldMinScale = minScale;
            minScale = Math.min(container.clientWidth / 600, container.clientHeight / 600);
            if (minScale < 0.1) minScale = 0.1;
            const ratio = minScale / oldMinScale;
            scale *= ratio;
            maxScale = minScale * 200;
            panX *= ratio;
            panY *= ratio;
            applyTransform();
        });
        applyTransform();
        function zoomInOut(delta, mouseX = null, mouseY = null) {
            let oldScale = scale;
            let zoomFactor = Math.abs(delta) < 1 ? scale * delta : delta;
            scale += zoomFactor;
            if (scale < minScale) scale = minScale;
            if (scale > maxScale) scale = maxScale;
            const cx = mouseX !== null ? mouseX : container.clientWidth / 2;
            const cy = mouseY !== null ? mouseY : container.clientHeight / 2;
            panX = cx - (cx - panX) * (scale / oldScale);
            panY = cy - (cy - panY) * (scale / oldScale);
            applyTransform();
        }
        container.addEventListener('wheel', (e) => {
            e.preventDefault();
            const zoomAmount = e.deltaY < 0 ? 0.3 : -0.3;
            zoomInOut(zoomAmount, e.clientX, e.clientY);
            const { x, y } = getCanvasCoords(e);
            if (!isDragging) { drawHover(x, y); }
        }, { passive: false });
        let isPanning = false;
        let isDragging = false;
        let startPanX = 0;
        let startPanY = 0;
        let hasMoved = false;
        let cooldownActive = false;
        container.addEventListener('mousedown', (e) => {
            if (e.target.closest('#container')) {
                const { x, y } = getCanvasCoords(e);
                if (rollbackMode) {
                    selectionStart = { x, y };
                    selectionEnd = { x, y };
                    updateSelectionUI();
                    isPanning = false;
                    isDragging = true;
                } else if (IS_ADMIN && toggleContinuous.checked && x >= 0 && x < 500 && y >= 0 && y < 500) {
                    isPanning = false;
                    isDragging = true;
                    placePixelDirectly(x, y);
                } else {
                    isPanning = true;
                    isDragging = false;
                    startPanX = e.clientX - panX;
                    startPanY = e.clientY - panY;
                    hasMoved = false;
                    clearHover();
                }
            }
        });
        window.addEventListener('mousemove', (e) => {
            const { x, y } = getCanvasCoords(e);
            if (isPanning) {
                hasMoved = true;
                panX = e.clientX - startPanX;
                panY = e.clientY - startPanY;
                applyTransform();
            } else if (e.target.closest('#container') && e.target.id !== 'minimapWrapper' && !e.target.closest('#minimapWrapper')) {
                if (isDragging && rollbackMode) {
                    selectionEnd = { x, y };
                    updateSelectionUI();
                } else if (isDragging && IS_ADMIN && toggleContinuous.checked) {
                    const rect = canvasWrapper.getBoundingClientRect();
                    const x = Math.floor((e.clientX - rect.left) / scale);
                    const y = Math.floor((e.clientY - rect.top) / scale);
                    if (x >= 0 && x < 500 && y >= 0 && y < 500) {
                        placePixelDirectly(x, y);
                    }
                } else {
                    drawHover(x, y);
                }
            }
            if (!isPanning || hasMoved) {
                if (x >= 0 && x < 500 && y >= 0 && y < 500) {
                    cursorCoords.innerText = `${x}, ${y}`;
                }
            }
            if (!isPanning && isDragging && IS_ADMIN && toggleContinuous.checked) {
                if (x >= 0 && x < 500 && y >= 0 && y < 500) {
                    placePixelDirectly(x, y);
                }
            }
        });
        container.addEventListener('mouseleave', () => { clearHover(); });
        window.addEventListener('mouseup', (e) => {
            isPanning = false;
            if (isDragging && rollbackMode && selectionStart && selectionEnd) {
                const x1 = Math.min(selectionStart.x, selectionEnd.x);
                const y1 = Math.min(selectionStart.y, selectionEnd.y);
                const x2 = Math.max(selectionStart.x, selectionEnd.x);
                const y2 = Math.max(selectionStart.y, selectionEnd.y);
                const w = x2 - x1 + 1;
                const h = y2 - y1 + 1;
                
                // Сначала сохраняем оригинал, потом запрашиваем историю
                originalAreaPixels = ctx.getImageData(x1, y1, w, h);
                
                socket.send(JSON.stringify({
                    type: 'get_area_history',
                    x1, y1, x2, y2
                }));
                document.getElementById('rollbackPanel').style.display = 'flex';
            }
            isDragging = false;
            const rect = canvasWrapper.getBoundingClientRect();
            const x = Math.floor((e.clientX - rect.left) / scale);
            const y = Math.floor((e.clientY - rect.top) / scale);
            if (e.target.closest('#container')) { drawHover(x, y); }
        });
        canvasWrapper.addEventListener('click', (e) => {
            if (hasMoved || rollbackMode) return;
            if (cooldownActive) { showToast("Кулдаун еще не прошел!"); return; }
            const rect = canvasWrapper.getBoundingClientRect();
            const x = Math.floor((e.clientX - rect.left) / scale);
            const y = Math.floor((e.clientY - rect.top) / scale);
            if (x >= 0 && x < 500 && y >= 0 && y < 500) {
                const p = ctx.getImageData(x, y, 1, 1).data;
                const hex = "#" + ((1 << 24) + (p[0] << 16) + (p[1] << 8) + p[2]).toString(16).slice(1).toLowerCase();
                if (hex === currentColor.toLowerCase()) { showToast("Этот цвет уже здесь!"); return; }
                if (IS_ADMIN && (toggleContinuous.checked || toggleNoCooldown.checked)) {
                    placePixelDirectly(x, y);
                    return;
                }
                selectedPixel = { x, y };
                drawHover(x, y);
                document.getElementById('confirmWrapper').style.display = 'flex';
            }
        });
        function sendPixel() {
            if (!selectedPixel || cooldownActive) return;
            placePixelDirectly(selectedPixel.x, selectedPixel.y);
            cancelSelection();
        }
        function placePixelDirectly(x, y) {
            if (cooldownActive && (!IS_ADMIN || !toggleNoCooldown.checked)) return;
            if (socket.readyState === WebSocket.OPEN) {
                if (brushSize > 1) {
                    const pixels = [];
                    const offset = Math.floor(brushSize / 2);
                    for (let i = -offset; i < -offset + brushSize; i++) {
                        for (let j = -offset; j < -offset + brushSize; j++) {
                            const px = x + i, py = y + j;
                            if (px >= 0 && px < 500 && py >= 0 && py < 500) {
                                const p = ctx.getImageData(px, py, 1, 1).data;
                                const hex = "#" + ((1 << 24) + (p[0] << 16) + (p[1] << 8) + p[2]).toString(16).slice(1).toLowerCase();
                                if (hex !== currentColor.toLowerCase()) {
                                    pixels.push({ x: px, y: py, color: currentColor });
                                    if (toggleNoCooldown.checked) {
                                        ctx.fillStyle = currentColor;
                                        ctx.fillRect(px, py, 1, 1);
                                    }
                                }
                            }
                        }
                    }
                    if (pixels.length > 0) socket.send(JSON.stringify({ pixels: pixels, no_cd: toggleNoCooldown.checked }));
                } else {
                    const p = ctx.getImageData(x, y, 1, 1).data;
                    const hex = "#" + ((1 << 24) + (p[0] << 16) + (p[1] << 8) + p[2]).toString(16).slice(1).toLowerCase();
                    if (hex !== currentColor.toLowerCase()) {
                        socket.send(JSON.stringify({ x: x, y: y, color: currentColor, no_cd: toggleNoCooldown.checked }));
                        if (toggleNoCooldown.checked) {
                            ctx.fillStyle = currentColor;
                            ctx.fillRect(x, y, 1, 1);
                        }
                    }
                }
            } else { showToast("Нет подключения к серверу"); }
        }
        function cancelSelection() {
            selectedPixel = null;
            document.getElementById('confirmWrapper').style.display = 'none';
            document.getElementById('cooldownText').style.display = 'block';
            clearHover();
        }
        minimapWrapper.addEventListener('mousedown', (e) => {
            e.stopPropagation();
            const rect = minimapWrapper.getBoundingClientRect();
            const clickPercentX = (e.clientX - rect.left) / rect.width;
            const clickPercentY = (e.clientY - rect.top) / rect.height;
            const targetCanvasX = clickPercentX * 500;
            const targetCanvasY = clickPercentY * 500;
            panX = (container.clientWidth / 2) - (targetCanvasX * scale);
            panY = (container.clientHeight / 2) - (targetCanvasY * scale);
            applyTransform();
        });
        let initialPinchDistance = null;
        let initialScale = 1;
        container.addEventListener('touchstart', (e) => {
            clearHover();
            if (e.touches.length === 1 && !e.target.closest('#minimapWrapper')) {
                const rect = canvasWrapper.getBoundingClientRect();
                const x = Math.floor((e.touches[0].clientX - rect.left) / scale);
                const y = Math.floor((e.touches[0].clientY - rect.top) / scale);
                if (rollbackMode) {
                    isPanning = false;
                    isDragging = true;
                    selectionStart = { x, y };
                    selectionEnd = { x, y };
                    updateSelectionUI();
                } else if (IS_ADMIN && toggleContinuous.checked && x >= 0 && x < 500 && y >= 0 && y < 500) {
                    isPanning = false;
                    isDragging = true;
                    placePixelDirectly(x, y);
                } else {
                    isPanning = true;
                    isDragging = false;
                }
                hasMoved = false;
                startPanX = e.touches[0].clientX - panX;
                startPanY = e.touches[0].clientY - panY;
            } else if (e.touches.length === 2) {
                isDragging = false;
                const touch1 = e.touches[0];
                const touch2 = e.touches[1];
                initialPinchDistance = Math.hypot(touch1.clientX - touch2.clientX, touch1.clientY - touch2.clientY);
                initialScale = scale;
            }
        }, { passive: false });
        container.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvasWrapper.getBoundingClientRect();
            if (e.touches.length === 1 && (isPanning || isDragging)) {
                const x = Math.floor((e.touches[0].clientX - rect.left) / scale);
                const y = Math.floor((e.touches[0].clientY - rect.top) / scale);
                if (isPanning) {
                    hasMoved = true;
                    panX = e.touches[0].clientX - startPanX;
                    panY = e.touches[0].clientY - startPanY;
                    applyTransform();
                } else if (isDragging && rollbackMode) {
                    selectionEnd = { x, y };
                    updateSelectionUI();
                } else if (!isPanning && isDragging && IS_ADMIN && toggleContinuous.checked) {
                    if (x >= 0 && x < 500 && y >= 0 && y < 500) { placePixelDirectly(x, y); }
                }
            } else if (e.touches.length === 2 && initialPinchDistance) {
                const touch1 = e.touches[0];
                const touch2 = e.touches[1];
                const currentDistance = Math.hypot(touch1.clientX - touch2.clientX, touch1.clientY - touch2.clientY);
                const zoomFactor = currentDistance / initialPinchDistance;
                let oldScale = scale;
                scale = initialScale * zoomFactor;
                if (scale < minScale) scale = minScale;
                if (scale > maxScale) scale = maxScale;
                const cx = (touch1.clientX + touch2.clientX) / 2;
                const cy = (touch1.clientY + touch2.clientY) / 2;
                panX = cx - (cx - panX) * (scale / oldScale);
                panY = cy - (cy - panY) * (scale / oldScale);
                applyTransform();
            }
        }, { passive: false });
        container.addEventListener('touchend', (e) => {
            if (isDragging && rollbackMode && selectionStart && selectionEnd) {
                const x1 = Math.min(selectionStart.x, selectionEnd.x);
                const y1 = Math.min(selectionStart.y, selectionEnd.y);
                const x2 = Math.max(selectionStart.x, selectionEnd.x);
                const y2 = Math.max(selectionStart.y, selectionEnd.y);
                const w = x2 - x1 + 1;
                const h = y2 - y1 + 1;

                originalAreaPixels = ctx.getImageData(x1, y1, w, h);

                socket.send(JSON.stringify({
                    type: 'get_area_history',
                    x1, y1, x2, y2
                }));
                document.getElementById('rollbackPanel').style.display = 'flex';
            }
            isDragging = false;
            isPanning = false;
            initialPinchDistance = null;
        });
        function adminClearCanvas() { }
        function generateTempToken() {
            if (IS_ADMIN) {
                socket.send(JSON.stringify({ type: 'generate_token', duration: 600 }));
            }
        }

        function toggleRollbackMode() {
            rollbackMode = !rollbackMode;
            const btn = document.getElementById('rollbackModeBtn');
            btn.style.background = rollbackMode ? '#a6e3a1' : '#f38ba8';
            btn.innerText = rollbackMode ? '✅ Выделите область' : '⏪ Откат участка';
            if (!rollbackMode) cancelRollback();
        }

        function updateSelectionUI() {
            if (!rollbackMode) return;
            
            if (selectionStart && selectionEnd) {
                const x1 = Math.min(selectionStart.x, selectionEnd.x);
                const y1 = Math.min(selectionStart.y, selectionEnd.y);
                const x2 = Math.max(selectionStart.x, selectionEnd.x);
                const y2 = Math.max(selectionStart.y, selectionEnd.y);
                const w = x2 - x1 + 1;
                const h = y2 - y1 + 1;

                // Полупрозрачный темный фон
                hCtx.fillStyle = 'rgba(0, 0, 0, 0.4)';
                hCtx.fillRect(x1, y1, w, h);

                // Яркая рамка
                hCtx.strokeStyle = '#a6e3a1';
                hCtx.lineWidth = 2;
                hCtx.setLineDash([5, 3]);
                hCtx.strokeRect(x1, y1, w, h);
                hCtx.setLineDash([]);
            }
        }

        function cancelRollback() {
            if (originalAreaPixels && selectionStart && selectionEnd) {
                const x1 = Math.min(selectionStart.x, selectionEnd.x);
                const y1 = Math.min(selectionStart.y, selectionEnd.y);
                ctx.putImageData(originalAreaPixels, x1, y1);
                syncMinimap();
            }
            selectionStart = null;
            selectionEnd = null;
            areaHistoryData = [];
            originalAreaPixels = null;
            hCtx.clearRect(0, 0, 500, 500);
            document.getElementById('rollbackPanel').style.display = 'none';
        }

        function previewRollback() {
            if (!originalAreaPixels || !selectionStart || !selectionEnd) return;
            
            const x1 = Math.min(selectionStart.x, selectionEnd.x);
            const y1 = Math.min(selectionStart.y, selectionEnd.y);
            
            ctx.putImageData(originalAreaPixels, x1, y1);
            
            const minutes = parseInt(document.getElementById('rollbackSlider').value);
            const targetTs = (Date.now() / 1000) - (minutes * 60);
            
            const toApply = areaHistoryData.filter(h => h.ts > targetTs);
            toApply.sort((a, b) => b.ts - a.ts);
            
            toApply.forEach(h => {
                ctx.fillStyle = COLOR_PALETTE[h.old];
                ctx.fillRect(h.x, h.y, 1, 1);
            });
            
            syncMinimap();
        }

        function applyRollback() {
            if (!selectionStart || !selectionEnd) return;
            const x1 = Math.min(selectionStart.x, selectionEnd.x);
            const y1 = Math.min(selectionStart.y, selectionEnd.y);
            const x2 = Math.max(selectionStart.x, selectionEnd.x);
            const y2 = Math.max(selectionStart.y, selectionEnd.y);

            const minutes = parseInt(document.getElementById('rollbackSlider').value);
            const targetTs = (Date.now() / 1000) - (minutes * 60);

            socket.send(JSON.stringify({
                type: 'rollback',
                x1, y1, x2, y2,
                timestamp: targetTs
            }));

            showToast("Откат применен!");
            originalAreaPixels = null;
            cancelRollback();
            toggleRollbackMode();
        }

        document.getElementById('rollbackSlider').oninput = function () {
            document.getElementById('rollbackTimeText').innerText = this.value + " мин. назад";
        };
    </script>
</body>
