<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PixelBattle</title>
    <style>
        body {
            display: flex;
            flex-direction: row;
            background-color: #1e1e2e;
            color: #cdd6f4;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        .canvas-container {
            flex: 1;
            background-color: #11111b;
            position: relative;
            cursor: crosshair;
            overflow: hidden;
            box-shadow: inset -5px 0 15px rgba(0, 0, 0, 0.5);
        }

        .canvas-container:active {
            cursor: grabbing;
        }

        /* Обертка для канвасов, чтобы зумить их вместе */
        .canvas-wrapper {
            position: absolute;
            left: 0;
            top: 0;
            /* Размеры будут управляться через JS */
            box-shadow: 0 0 20px rgba(0, 0, 0, 1);
            image-rendering: -webkit-optimize-contrast;
            image-rendering: pixelated;
        }

        #pixelCanvas,
        #hoverCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        #pixelCanvas {
            background-color: #ffffff;
            position: absolute;
            top: 0;
            left: 0;
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }

        #hoverCanvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            /* Пропускает клики на нижний пиксельный слой */
            image-rendering: pixelated;
        }

        .sidebar {
            width: 260px;
            background: #181825;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 15px;
            box-sizing: border-box;
            z-index: 10;
            border-left: 2px solid #313244;
        }

        h1 {
            margin: 0 0 10px 0;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            font-size: 24px;
            text-align: center;
        }

        .info-panel {
            background: #313244;
            padding: 10px;
            border-radius: 8px;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
            border: 1px solid #45475a;
        }

        .info-panel span {
            color: #a6e3a1;
            font-weight: bold;
        }

        .palette {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 25px;
            padding: 10px;
            background: #1e1e2e;
            border-radius: 12px;
            border: 1px solid #313244;
            width: 100%;
            box-sizing: border-box;
        }

        .color-btn {
            width: 32px;
            height: 32px;
            border: 2px solid transparent;
            border-radius: 6px;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .color-btn:hover {
            transform: translateY(-2px);
        }

        .color-btn.active {
            border-color: #f38ba8;
            transform: scale(1.15);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .zoom-btn {
            background: #45475a;
            color: #fff;
            border: none;
            border-radius: 6px;
            width: 45px;
            height: 45px;
            font-size: 24px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .zoom-btn:hover {
            background: #585b70;
        }

        .zoom-btn:active {
            transform: translateY(2px);
            box-shadow: none;
        }

        .confirm-wrapper {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            margin-bottom: 20px;
        }

        .confirm-btn {
            background: #a6e3a1;
            color: #11111b;
            border: none;
            padding: 14px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            animation: pulse-green 1.5s infinite;
        }

        .cancel-btn {
            background: #313244;
            color: #cdd6f4;
            border: 1px solid #45475a;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
        }

        @keyframes pulse-green {
            0% {
                box-shadow: 0 0 0 0 rgba(166, 227, 161, 0.7);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(166, 227, 161, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(166, 227, 161, 0);
            }
        }

        .cooldown-text {
            font-size: 18px;
            font-weight: bold;
            color: #a6e3a1;
            text-align: center;
            margin-bottom: 20px;
            min-height: 24px;
        }

        .status {
            margin-top: auto;
            font-size: 13px;
            color: #a6adc8;
            text-align: center;
            padding: 10px;
            background: #1e1e2e;
            border-radius: 8px;
            width: 100%;
            box-sizing: border-box;
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #f38ba8;
            color: #11111b;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 100;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        /* Миникарта */
        .minimap-wrapper {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 150px;
            height: 150px;
            background: #fff;
            border: 2px solid #585b70;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.8);
            z-index: 50;
            overflow: hidden;
            cursor: pointer;
        }

        #pixelCanvas,
        #hoverCanvas {
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            -ms-interpolation-mode: nearest-neighbor;
            display: block;
        }

        #minimapCanvas {
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
            display: block;
        }

        .minimap-viewport {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 1.5px solid #f38ba8;
            box-sizing: border-box;
            background: rgba(243, 139, 168, 0.2);
            pointer-events: none;
        }

        /* --- Admin Panel Styles --- */
        .admin-panel {
            display: none;
            background: #f38ba8;
            color: #11111b;
            padding: 12px;
            border-radius: 8px;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 20px;
            text-align: center;
            border: 2px solid #ffffff;
            box-shadow: 0 0 15px rgba(243, 139, 168, 0.4);
        }

        .admin-title {
            font-weight: 900;
            text-transform: uppercase;
            font-size: 13px;
            margin-bottom: 8px;
            display: block;
        }

        .admin-toggle-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            text-align: left;
        }

        .admin-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 10px;
            color: #11111b;
            font-weight: bold;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.3);
            padding: 4px 6px;
            border-radius: 4px;
        }

        .admin-brush-group {
            margin-top: 10px;
            text-align: left;
            background: rgba(255, 255, 255, 0.2);
            padding: 6px;
            border-radius: 6px;
        }

        .admin-brush-label {
            font-size: 11px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        #brushSizeRange {
            width: 100%;
            cursor: pointer;
            accent-color: #11111b;
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: auto;
                flex-direction: row;
                flex-wrap: wrap;
                padding: 10px;
                border-left: none;
                border-top: 2px solid #313244;
                justify-content: center;
                gap: 10px;
            }

            h1 {
                display: none;
            }

            .info-panel {
                width: auto;
                margin-bottom: 0;
                padding: 5px 10px;
                font-size: 12px;
            }

            .palette {
                margin-bottom: 0;
                padding: 5px;
                gap: 5px;
                width: auto;
            }

            .color-btn {
                width: 26px;
                height: 26px;
            }

            .controls {
                width: auto;
                margin-bottom: 0;
            }

            .status {
                display: none;
            }

            .cooldown-text {
                margin-bottom: 0;
                font-size: 16px;
                margin-left: 10px;
                align-self: center;
            }

            .canvas-container {
                flex: 1;
            }

            .minimap-wrapper {
                width: 100px;
                height: 100px;
                top: 10px;
                left: 10px;
                bottom: auto;
            }
        }
    </style>
</head>

<body>

    <div class="canvas-container" id="container">
        <!-- Обертка слоя пикселей и слоя превью (hover) -->
        <div class="canvas-wrapper" id="canvasWrapper">
            <canvas id="pixelCanvas" width="500" height="500"></canvas>
            <canvas id="hoverCanvas" width="500" height="500"></canvas>
        </div>

        <div class="minimap-wrapper" id="minimapWrapper">
            <canvas id="minimapCanvas" width="150" height="150"
                style="width: 100%; height: 100%; object-fit: contain; image-rendering: pixelated;"></canvas>
            <div class="minimap-viewport" id="minimapViewport"></div>
        </div>
    </div>

    <div class="sidebar">
        <h1>⚔️ PixelBattle</h1>

        <div class="info-panel">
            Размер: <span>500x500</span><br>
            Курсор: <span id="cursorCoords">0, 0</span>
        </div>

        <div id="adminPanel" class="admin-panel">
            <span class="admin-title">👑 Админ-режим</span>
            <div class="admin-toggle-group">
                <label class="admin-toggle">
                    🚀 No CD
                    <input type="checkbox" id="toggleNoCooldown" checked>
                </label>
                <label class="admin-toggle">
                    🖌 Paint
                    <input type="checkbox" id="toggleContinuous" onchange="cancelSelection()">
                </label>
            </div>
            <div class="admin-brush-group">
                <div class="admin-brush-label">Кисть: <span id="brushSizeVal">1x1</span></div>
                <input type="range" id="brushSizeRange" min="1" max="10" value="1"
                    oninput="updateBrushSizeLabel(this.value)">
            </div>
        </div>

        <div class="palette" id="palette">
            <div class="color-btn active" style="background-color: #000000;" data-color="#000000"></div>
            <div class="color-btn" style="background-color: #4a4a4a;" data-color="#4a4a4a"></div>
            <div class="color-btn" style="background-color: #ffffff; border: 1px solid #cdd6f4;" data-color="#ffffff">
            </div>
            <div class="color-btn" style="background-color: #ff0000;" data-color="#ff0000"></div>
            <div class="color-btn" style="background-color: #ff4500;" data-color="#ff4500"></div>
            <div class="color-btn" style="background-color: #ff8800;" data-color="#ff8800"></div>
            <div class="color-btn" style="background-color: #ffd700;" data-color="#ffd700"></div>
            <div class="color-btn" style="background-color: #ffff00;" data-color="#ffff00"></div>
            <div class="color-btn" style="background-color: #00ff00;" data-color="#00ff00"></div>
            <div class="color-btn" style="background-color: #006400;" data-color="#006400"></div>
            <div class="color-btn" style="background-color: #00ffff;" data-color="#00ffff"></div>
            <div class="color-btn" style="background-color: #0000ff;" data-color="#0000ff"></div>
            <div class="color-btn" style="background-color: #00008b;" data-color="#00008b"></div>
            <div class="color-btn" style="background-color: #8a2be2;" data-color="#8a2be2"></div>
            <div class="color-btn" style="background-color: #ff00ff;" data-color="#ff00ff"></div>
            <div class="color-btn" style="background-color: #ffb6c1;" data-color="#ffb6c1"></div>
            <div class="color-btn" style="background-color: #8b4513;" data-color="#8b4513"></div>
            <div class="color-btn" style="background-color: #d2b48c;" data-color="#d2b48c"></div>
        </div>

        <div class="controls">
            <button class="zoom-btn" onclick="zoomInOut(-1)">-</button>
            <button class="zoom-btn" onclick="zoomInOut(1)">+</button>
        </div>

        <div class="cooldown-text" id="cooldownText">Готов к битве</div>
        <div id="confirmWrapper" class="confirm-wrapper" style="display:none;">
            <button class="confirm-btn" onclick="sendPixel()">✅ Подтвердить</button>
            <button class="cancel-btn" onclick="cancelSelection()">Отмена</button>
        </div>
        <div class="status" id="status">Подключение к серверу...</div>
    </div>

    <div class="toast" id="toast">Ошибка</div>

    <script>
        const canvasWrapper = document.getElementById('canvasWrapper');
        const canvas = document.getElementById('pixelCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        ctx.imageSmoothingEnabled = false;
        ctx.webkitImageSmoothingEnabled = false;
        ctx.mozImageSmoothingEnabled = false;

        const hoverCanvas = document.getElementById('hoverCanvas');
        const hCtx = hoverCanvas.getContext('2d');
        hCtx.imageSmoothingEnabled = false;

        const minimapCanvas = document.getElementById('minimapCanvas');
        const mCtx = minimapCanvas.getContext('2d', { willReadFrequently: true });
        mCtx.imageSmoothingEnabled = false;
        const minimapViewport = document.getElementById('minimapViewport');
        const minimapWrapper = document.getElementById('minimapWrapper');

        const container = document.getElementById('container');
        const statusEl = document.getElementById('status');
        const cooldownText = document.getElementById('cooldownText');
        const toastEl = document.getElementById('toast');
        const cursorCoords = document.getElementById('cursorCoords');

        let currentColor = '#000000';
        let cooldownActive = false;
        let cooldownTime = 0;
        let selectedPixel = null; // {x, y}
        let IS_ADMIN = false;
        let brushSize = 1;

        const toggleNoCooldown = document.getElementById('toggleNoCooldown');
        const toggleContinuous = document.getElementById('toggleContinuous');
        const brushSizeVal = document.getElementById('brushSizeVal');

        function updateBrushSizeLabel(val) {
            brushSize = parseInt(val);
            brushSizeVal.innerText = `${val}x${val}`;
        }

        // --- Палитра ---
        const colorBtns = document.querySelectorAll('.color-btn');
        colorBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                colorBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentColor = btn.getAttribute('data-color');
            });
        });

        function showToast(msg) {
            toastEl.innerText = msg;
            toastEl.style.opacity = 1;
            setTimeout(() => { toastEl.style.opacity = 0; }, 2000);
        }

        function syncMinimap() {
            mCtx.imageSmoothingEnabled = true;
            mCtx.drawImage(canvas, 0, 0, minimapCanvas.width, minimapCanvas.height);
            mCtx.imageSmoothingEnabled = false;
        }

        // --- Hover Preview ---
        function clearHover() {
            hCtx.clearRect(0, 0, 500, 500);
        }

        function drawHover(mouseX, mouseY) {
            clearHover();

            // 1. Сначала рисуем выбранный пиксель (фиксированный), если он есть
            if (selectedPixel) {
                const { x, y } = selectedPixel;
                hCtx.globalAlpha = 0.8;
                hCtx.fillStyle = currentColor;
                hCtx.fillRect(x, y, 1, 1);

                hCtx.globalAlpha = 1.0;
                hCtx.strokeStyle = currentColor === '#ffffff' ? '#000000' : '#ffffff';
                hCtx.lineWidth = 2 / scale;
                hCtx.strokeRect(x, y, 1, 1);
            }

            // 2. Затем рисуем текущий hover под мышкой (если он не совпадает с выбранным)
            if (mouseX !== null && mouseY !== null && mouseX >= 0 && mouseX < 500 && mouseY >= 0 && mouseY < 500) {
                if (!selectedPixel || selectedPixel.x !== mouseX || selectedPixel.y !== mouseY) {
                    hCtx.globalAlpha = 0.4;
                    hCtx.fillStyle = currentColor;
                    hCtx.fillRect(mouseX, mouseY, 1, 1);

                    hCtx.globalAlpha = 0.8;
                    hCtx.strokeStyle = currentColor === '#ffffff' ? '#000000' : '#ffffff';
                    hCtx.lineWidth = 1 / scale;
                    hCtx.strokeRect(mouseX, mouseY, 1, 1);
                }
            }
        }

        // Подключение WebSocket
        const wsUrl = `wss://patrina-unlusty-vince.ngrok-free.dev/ws`;

        function connectSocket() {
            const socket = new WebSocket(wsUrl);

            socket.onopen = () => {
                statusEl.innerText = '🟢 Активно (В сети)';
                statusEl.style.color = '#a6e3a1';
            };

            socket.onmessage = (event) => {
                const message = JSON.parse(event.data);

                if (message.type === 'init') {
                    const data = message.data;
                    for (let y = 0; y < data.length; y++) {
                        for (let x = 0; x < data[y].length; x++) {
                            ctx.fillStyle = data[y][x];
                            ctx.fillRect(x, y, 1, 1);
                        }
                    }
                    syncMinimap();
                } else if (message.type === 'update') {
                    ctx.fillStyle = message.color;
                    ctx.fillRect(message.x, message.y, 1, 1);
                    mCtx.fillStyle = message.color;
                    // Рисуем пиксель на миникарте размером 1x1, чтобы он не исчезал (0.3 - слишком мало)
                    mCtx.fillRect(Math.floor(message.x * 0.3), Math.floor(message.y * 0.3), 1, 1);
                } else if (message.type === 'admin_status') {
                    IS_ADMIN = message.value;
                    if (IS_ADMIN) {
                        document.getElementById('adminPanel').style.display = 'block';
                        showToast("Режим администратора активирован!");
                    }
                } else if (message.type === 'error') {
                    showToast(message.message);
                } else if (message.type === 'success') {
                    startCooldown(7);
                }
            };

            socket.onerror = (error) => {
                statusEl.innerText = '🔴 Ошибка подключения';
                statusEl.style.color = '#f38ba8';
            };

            socket.onclose = () => {
                statusEl.innerText = '🔴 Подключение закрыто. Реконнект...';
                statusEl.style.color = '#f38ba8';
                setTimeout(connectSocket, 3000);
            };

            return socket;
        }

        let socket = connectSocket();

        function startCooldown(seconds) {
            if (IS_ADMIN && toggleNoCooldown.checked) return; // Пропуск для админа
            cooldownActive = true;
            cooldownTime = seconds;
            updateCooldownUI();

            const timer = setInterval(() => {
                cooldownTime--;
                updateCooldownUI();
                if (cooldownTime <= 0) {
                    clearInterval(timer);
                    cooldownActive = false;
                    cooldownText.innerText = "Готов к битве";
                    cooldownText.style.color = '#a6e3a1';
                }
            }, 1000);
        }

        function updateCooldownUI() {
            if (cooldownTime > 0) {
                cooldownText.innerText = `Ждите: ${cooldownTime} с`;
                cooldownText.style.color = '#f38ba8';
            }
        }

        // --- Зум и панорамирование ---
        let scale = Math.min(container.clientWidth / 600, container.clientHeight / 600);
        if (scale < 0.5) scale = 0.5;

        let panX = (container.clientWidth - 500 * scale) / 2;
        let panY = (container.clientHeight - 500 * scale) / 2;

        function applyTransform() {
            // Используем прямое изменение размеров вместо scale для iPhone
            canvasWrapper.style.left = panX + 'px';
            canvasWrapper.style.top = panY + 'px';
            canvasWrapper.style.width = (500 * scale) + 'px';
            canvasWrapper.style.height = (500 * scale) + 'px';

            // Миникарта: используем % для вьюпорта, чтобы работало на любых экранах
            const visibleW_pct = (container.clientWidth / scale) / 500 * 100;
            const visibleH_pct = (container.clientHeight / scale) / 500 * 100;
            const startX_pct = (-panX / scale) / 500 * 100;
            const startY_pct = (-panY / scale) / 500 * 100;

            minimapViewport.style.left = startX_pct + '%';
            minimapViewport.style.top = startY_pct + '%';
            minimapViewport.style.width = visibleW_pct + '%';
            minimapViewport.style.height = visibleH_pct + '%';
        }

        window.addEventListener('resize', applyTransform);
        applyTransform();

        function zoomInOut(delta, mouseX = null, mouseY = null) {
            let oldScale = scale;

            // Умный зум: чем больше текущий масштаб, тем быстрее он меняется дальше
            let zoomFactor = Math.abs(delta) < 1 ? scale * delta : delta;
            scale += zoomFactor;

            // РАСШИРЕННЫЕ ЛИМИТЫ (допускаем огромное увеличение)
            if (scale < 0.1) scale = 0.1;
            if (scale > 150) scale = 150; // До 150x зума!

            const cx = mouseX !== null ? mouseX : container.clientWidth / 2;
            const cy = mouseY !== null ? mouseY : container.clientHeight / 2;

            panX = cx - (cx - panX) * (scale / oldScale);
            panY = cy - (cy - panY) * (scale / oldScale);

            applyTransform();
        }

        container.addEventListener('wheel', (e) => {
            e.preventDefault();
            const zoomAmount = e.deltaY < 0 ? 0.3 : -0.3; // 30% от текущего зума каждый щелчок
            zoomInOut(zoomAmount, e.clientX, e.clientY);

            // Обновляем превью под мышкой после зума
            const rect = canvasWrapper.getBoundingClientRect();
            const x = Math.floor((e.clientX - rect.left) / scale);
            const y = Math.floor((e.clientY - rect.top) / scale);
            if (!isDragging) {
                drawHover(x, y);
            }
        }, { passive: false });

        let isPanning = false;
        let isDragging = false;
        let startPanX = 0;
        let startPanY = 0;
        let hasMoved = false;

        container.addEventListener('mousedown', (e) => {
            if (e.target.closest('#container')) {
                const rect = canvasWrapper.getBoundingClientRect();
                const x = Math.floor((e.clientX - rect.left) / scale);
                const y = Math.floor((e.clientY - rect.top) / scale);

                // Если включен режим непрерывного рисования - приоритет рисованию
                if (IS_ADMIN && toggleContinuous.checked && x >= 0 && x < 500 && y >= 0 && y < 500) {
                    isPanning = false;
                    isDragging = true;
                    placePixelDirectly(x, y); // Ставим сразу первый пиксель
                } else {
                    isPanning = true;
                    isDragging = false;
                }

                hasMoved = false;
                startPanX = e.clientX - panX;
                startPanY = e.clientY - panY;
                clearHover(); // Скрываем превью при движении
            }
        });

        window.addEventListener('mousemove', (e) => {
            const rect = canvasWrapper.getBoundingClientRect();
            const x = Math.floor((e.clientX - rect.left) / scale);
            const y = Math.floor((e.clientY - rect.top) / scale);

            if (isPanning) {
                hasMoved = true;
                panX = e.clientX - startPanX;
                panY = e.clientY - startPanY;
                applyTransform();
            } else if (e.target.closest('#container') && e.target.id !== 'minimapWrapper' && !e.target.closest('#minimapWrapper')) {
                drawHover(x, y);
            }

            if (!isPanning || hasMoved) {
                if (x >= 0 && x < 500 && y >= 0 && y < 500) {
                    cursorCoords.innerText = `${x}, ${y}`;
                }
            }

            // --- Continuous Paint (Админ) ---
            if (!isPanning && isDragging && IS_ADMIN && toggleContinuous.checked) {
                if (x >= 0 && x < 500 && y >= 0 && y < 500) {
                    placePixelDirectly(x, y);
                }
            }
        });

        container.addEventListener('mouseleave', () => {
            clearHover();
        });

        window.addEventListener('mouseup', (e) => {
            isPanning = false;
            isDragging = false;
            // Возвращаем превью в конце перетаскивания
            const rect = canvasWrapper.getBoundingClientRect();
            const x = Math.floor((e.clientX - rect.left) / scale);
            const y = Math.floor((e.clientY - rect.top) / scale);
            if (e.target.closest('#container')) {
                drawHover(x, y);
            }
        });

        // Подготовка к отправке (выбор пикселя)
        canvasWrapper.addEventListener('click', (e) => {
            if (hasMoved) return;
            if (cooldownActive) {
                showToast("Кулдаун еще не прошел!");
                return;
            }

            const rect = canvasWrapper.getBoundingClientRect();
            const x = Math.floor((e.clientX - rect.left) / scale);
            const y = Math.floor((e.clientY - rect.top) / scale);

            if (x >= 0 && x < 500 && y >= 0 && y < 500) {
                // 1. Проверка на тот же цвет
                const p = ctx.getImageData(x, y, 1, 1).data;
                const hex = "#" + ((1 << 24) + (p[0] << 16) + (p[1] << 8) + p[2]).toString(16).slice(1).toLowerCase();
                if (hex === currentColor.toLowerCase()) {
                    showToast("Этот цвет уже здесь!");
                    return;
                }

                if (IS_ADMIN && (toggleContinuous.checked || toggleNoCooldown.checked)) {
                    // Админ с включенными фишками ставит пиксель сразу
                    placePixelDirectly(x, y);
                    return;
                }

                // 2. Выбор пикселя для подтверждения (для обычных юзеров или админа без фишек)
                selectedPixel = { x, y };
                drawHover(x, y);

                // Показываем блок подтверждения
                document.getElementById('confirmWrapper').style.display = 'flex';
                document.getElementById('cooldownText').style.display = 'none';
            }
        });

        function sendPixel() {
            if (!selectedPixel || cooldownActive) return;
            placePixelDirectly(selectedPixel.x, selectedPixel.y);
            // Скрываем кнопку после отправки
            cancelSelection();
        }

        function placePixelDirectly(x, y) {
            if (cooldownActive && (!IS_ADMIN || !toggleNoCooldown.checked)) return;

            if (socket.readyState === WebSocket.OPEN) {
                // Если размер кисти больше 1 - рисуем квадрат
                const offset = Math.floor(brushSize / 2);
                for (let i = -offset; i < -offset + brushSize; i++) {
                    for (let j = -offset; j < -offset + brushSize; j++) {
                        const px = x + i;
                        const py = y + j;

                        if (px >= 0 && px < 500 && py >= 0 && py < 500) {
                            // Оптимизация: не шлем если цвет уже тот же
                            const p = ctx.getImageData(px, py, 1, 1).data;
                            const hex = "#" + ((1 << 24) + (p[0] << 16) + (p[1] << 8) + p[2]).toString(16).slice(1).toLowerCase();
                            if (hex !== currentColor.toLowerCase()) {
                                socket.send(JSON.stringify({ x: px, y: py, color: currentColor }));
                                // Локально тоже рисуем сразу для отзывчивости (админам можно)
                                ctx.fillStyle = currentColor;
                                ctx.fillRect(px, py, 1, 1);
                            }
                        }
                    }
                }
            } else {
                showToast("Нет подключения к серверу");
            }
        }

        function cancelSelection() {
            selectedPixel = null;
            document.getElementById('confirmWrapper').style.display = 'none';
            document.getElementById('cooldownText').style.display = 'block';
            clearHover();
        }

        // Клики по миникарте
        minimapWrapper.addEventListener('mousedown', (e) => {
            e.stopPropagation(); // Не перетаскиваем основное поле
            const rect = minimapWrapper.getBoundingClientRect();
            const clickPercentX = (e.clientX - rect.left) / rect.width;
            const clickPercentY = (e.clientY - rect.top) / rect.height;

            const targetCanvasX = clickPercentX * 500;
            const targetCanvasY = clickPercentY * 500;

            panX = (container.clientWidth / 2) - (targetCanvasX * scale);
            panY = (container.clientHeight / 2) - (targetCanvasY * scale);
            applyTransform();
        });

        // Мобильный тач
        let initialPinchDistance = null;
        let initialScale = 1;

        container.addEventListener('touchstart', (e) => {
            clearHover(); // На мобилках нет Hover
            if (e.touches.length === 1 && !e.target.closest('#minimapWrapper')) {
                isDragging = true;
                hasMoved = false;
                startPanX = e.touches[0].clientX - panX;
                startPanY = e.touches[0].clientY - panY;
            } else if (e.touches.length === 2) {
                isDragging = false;
                const touch1 = e.touches[0];
                const touch2 = e.touches[1];
                initialPinchDistance = Math.hypot(
                    touch1.clientX - touch2.clientX,
                    touch1.clientY - touch2.clientY
                );
                initialScale = scale;
            }
        }, { passive: false });

        container.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (e.touches.length === 1 && isDragging) {
                hasMoved = true;
                panX = e.touches[0].clientX - startPanX;
                panY = e.touches[0].clientY - startPanY;
                applyTransform();
            } else if (e.touches.length === 2 && initialPinchDistance) {
                const touch1 = e.touches[0];
                const touch2 = e.touches[1];
                const currentDistance = Math.hypot(
                    touch1.clientX - touch2.clientX,
                    touch1.clientY - touch2.clientY
                );
                const zoomFactor = currentDistance / initialPinchDistance;

                let oldScale = scale;
                scale = initialScale * zoomFactor;

                if (scale < 0.1) scale = 0.1;
                if (scale > 150) scale = 150;

                const cx = (touch1.clientX + touch2.clientX) / 2;
                const cy = (touch1.clientY + touch2.clientY) / 2;

                panX = cx - (cx - panX) * (scale / oldScale);
                panY = cy - (cy - panY) * (scale / oldScale);

                applyTransform();
            }
        }, { passive: false });

        container.addEventListener('touchend', (e) => {
            isDragging = false;
            initialPinchDistance = null;
        });

        function adminClearCanvas() {
            // Удалено по запросу пользователя. Функцию можно вернуть при необходимости.
        }

    </script>
